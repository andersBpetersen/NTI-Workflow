services:
  nti-workflow:
    image: ${NTI_WORKFLOW_IMAGE:-tickjf/nti-workflow:0.5.0}
    container_name: nti-workflow
    ports:
      - "${NTI_WORKFLOW_PORT:-8000}:8000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
